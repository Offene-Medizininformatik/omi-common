plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.github.Offene-Medizininformatik'
version = '1.0.1'

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

repositories {
    mavenCentral()
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
}